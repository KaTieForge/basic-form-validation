<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Contact Form</h1>
    </header>

    <main>
      <section>
        <form id="contactForm">
          <label>Name:</label><br />
          <input type="text" id="name" /><br /><br />

          <label>Email:</label><br />
          <input type="email" id="email" /><br /><br />

          <button type="submit">Submit</button>
        </form>

        <p id="message"></p>
      </section>
    </main>

    <footer>
      <p>Beginner Project</p>
      <p>
        This project creates a simple form that checks whether the user has
        filled out required fields. It introduces form handling and basic
        validation logic in JavaScript.
      </p>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
